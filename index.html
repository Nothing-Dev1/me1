<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuTheyab</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: url('https://i.pinimg.com/originals/51/ae/a3/51aea3393b8234a1e69d8713a0a58bc3.gif') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Courier New', Courier, monospace;
            color: #0719be;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        .image-container img {
            width: 750px;
            height: auto;
            border: 2px solid #0b2ada;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 255, 0.7);
        }
        .info {
            margin-top: 20px;
            font-size: 1.5em;
            color: #FFFFFF;
            text-shadow: 0 0 8px #FFFFFF, 0 0 15px #FFFFFF, 0 0 25px #FFFFFF;
            letter-spacing: 4.5px;
            white-space: pre-wrap;
        }
        .text {
            margin-top: 20px;
            font-size: 3em;
            color: #211dff;
            text-shadow: 0 0 8px #0b07d3, 0 0 15px #1121fb, 0 0 25px #2911ff;
            letter-spacing: 4.5px;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="https://gifdb.com/images/high/puppet-with-fire-exdjlk4bbjsk381m.gif" alt="Discord Image">
    </div>
    <audio autoplay loop>
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <div class="text">خلي الوقو ينفعك استحمل ما يجيك</div>
    <div class="info" id="ip-info">
        <strong>IP: <span id="ip"></span></strong><br>
        <span><strong>City:</strong> <span id="city"></span></span><br>
        <span><strong>Region:</strong> <span id="region"></span></span><br>
        <span><strong>Country:</strong> <span id="country"></span></span><br>
        <span><strong>Location:</strong> <span id="loc"></span></span><br>
        <span><strong>Organization:</strong> <span id="org"></span></span><br>
        <span><strong>Timezone:</strong> <span id="timezone"></span></span>
    </div>
    <div class="text">: BuTheyab GG I Have Your Ips :</div>

    <script>
        fetch('https://ipinfo.io/json')
        .then(response => response.json())
        .then(data => {
            delete data.readme;
            const infoDiv = document.getElementById('ip-info');
            infoDiv.textContent = JSON.stringify(data, null, 2);
        });
    </script>
</body>
</html>
